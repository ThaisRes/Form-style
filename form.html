<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário</title>
</head>
<body>
    <main>
        <form action="">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label>Nome:</label>
                <input type="text">
                <br>
                <label>Endereço:</label>
                <input type="text">
                <br>
                <label>Cidade:</label>
                <input type="text">
                <br>

                <label>Estado:</label>
                <select name="Estado" id="">
                    <option value="">Rio de Janeiro</option>
                    <option value="">São Paulo</option>
                    <option value="">Minas Gerais</option>
                    <option value="">Rio Grande do Sul</option>
                    <option value="">Pernanbuco</option>
                    <option value="">Ceará</option>
                </select>
                <br>
            </fieldset>
        </form>
        
        <form action="">
            <fieldset>
                <legend>Dados Profissionais</legend>
                <span>Natureza do Cargo: </span>
                <select name="Natureza do Cargo" id="">
                    <option value="">Gerência</option>
                    <option value="">Financeiro</option>
                    <option value="">Recepção</option>
                    <option value="">Administrativo</option>
                    <option value="">Jurídico</option>
                </select>
                <br><br>
    
                <label for="">Área de interesse: </label>
                <br>

                <input value="" type="checkbox" >
                <label for="">Computação</label>
                <br>
                <input value="" type="checkbox" >
                <label for="">Biologia</label>
                <br>
                <input value="" type="checkbox" >
                <label for="">Meio Ambiente</label>
                <br>
                <input value="" type="checkbox">
                <label for="">Engenharia</label>
                <br>
                <input value="" type="checkbox">
                <label for="">História</label>
                <br><br>
                
    
                <label for="">Mini Currículo:</label><br>
                <textarea name="" id="" rows="3" cols="40">                    
                </textarea>
            </fieldset>
        </form>
        <br>

        <button>Enviar</button>
        <button>Limpar</button>

    </main>    
</body>
</html>
